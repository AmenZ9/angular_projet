<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card shadow-sm border-danger">
      <div class="card-header bg-danger text-white">
        <h4 class="mb-0">Supprimer un produit</h4>
      </div>
      <div class="card-body text-center" *ngIf="id">
        <p class="fs-5">
          Voulez-vous vraiment supprimer le produit d'id
          <strong>{{ id }}</strong> ?
        </p>
        <div class="d-flex justify-content-center gap-3 mt-3">
          <button class="btn btn-danger" (click)="valider()">
            Oui, supprimer
          </button>
          <button class="btn btn-secondary" (click)="annuler()">
            Annuler
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
