<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-header bg-warning">
        <h4 class="mb-0">Modifier un produit</h4>
      </div>
      <div class="card-body">
        <form #f="ngForm" (ngSubmit)="modifier(f)" *ngIf="p">

          <div class="mb-3">
            <label class="form-label">Id</label>
            <input type="number" class="form-control"
                   readonly name="id" [ngModel]="p.id">
          </div>

          <div class="mb-3">
            <label class="form-label">Nom</label>
            <input type="text" class="form-control"
                   required name="nom" [ngModel]="p.nom">
          </div>

          <div class="mb-3">
            <label class="form-label">Prix</label>
            <input type="number" class="form-control"
                   required name="prix" [ngModel]="p.prix" min="0">
          </div>

          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control"
                      name="description" [ngModel]="p.description" rows="3">
            </textarea>
          </div>

          <div class="mb-3">
            <label class="form-label">Stock</label>
            <input type="number" class="form-control"
                   required name="stock" [ngModel]="p.stock" min="0">
          </div>

          <div class="mb-3">
            <label class="form-label">Catégorie</label>
            <select class="form-select" required
                    name="categorie_id" [ngModel]="p.categorieId">
              <option *ngFor="let c of lescategories" [value]="c.id">
                {{ c.nom }}
              </option>
            </select>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-warning">
              Modifier
            </button>
            <a routerLink="/produits" class="btn btn-secondary">
              Annuler
            </a>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>
