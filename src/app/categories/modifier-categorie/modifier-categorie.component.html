<div class="row justify-content-center">

  <div class="col-md-6">

    <div class="card shadow-sm">

      <div class="card-header bg-warning">
        <h4 class="mb-0">Modifier une catégorie</h4>
      </div>

      <div class="card-body">

        <form #f="ngForm" (ngSubmit)="modifier(f)" *ngIf="categorie">

          <div class="mb-3">
            <label class="form-label">Id</label>
            <input
              type="number"
              class="form-control"
              readonly
              name="id"
              [ngModel]="categorie.id"
            >
          </div>

          <div class="mb-3">
            <label class="form-label">Nom</label>
            <input
              type="text"
              class="form-control"
              required
              name="nom"
              [(ngModel)]="categorie.nom"
            >
          </div>

          <div class="d-flex gap-2">

            <button type="submit" class="btn btn-warning">
              Modifier
            </button>

            <a routerLink="/categories" class="btn btn-secondary">
              Annuler
            </a>

          </div>

        </form>

      </div>

    </div>

  </div>

</div>
