<h2 class="mb-4">Liste des catégories</h2>

<!-- Bouton ajouter -->
<a routerLink="/ajouter-categorie" class="btn btn-success mb-4">
  + Ajouter une catégorie
</a>

<!-- Grille catégories -->
<div class="row">

  <div class="col-md-4 mb-4" *ngFor="let c of categories">

    <div class="card h-100 shadow-sm">

      <div class="card-body">

        <h5 class="card-title">
          {{ c.nom }}
        </h5>

        <p class="card-text text-muted">
          ID : {{ c.id }}
        </p>

      </div>

      <div class="card-footer d-flex justify-content-between">

        <a
          [routerLink]="['/categories/modifier', c.id]"
          class="btn btn-sm btn-warning"
        >
          Modifier
        </a>

        <a
          [routerLink]="['/categories/supprimer', c.id]"
          class="btn btn-sm btn-danger"
        >
          Supprimer
        </a>

      </div>

    </div>

  </div>

</div>

<!-- Aucun résultat -->
<div class="alert alert-info" *ngIf="categories.length === 0">
  Aucune catégorie trouvée.
</div>
